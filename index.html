<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steuerung Pro & Live-Poll</title>
    
    <!-- Firebase Compat Bibliotheken -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent: #bb86fc;
        }
        
        body.theme-light {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent: #6200ea;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 15px; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 20px; 
            max-width: 500px; 
            margin-left: auto;
            margin-right: auto;
        }

        h2, h3 { text-align: center; margin: 0; }

        .extras-bar {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 5px;
        }
        .icon-btn:active { transform: scale(0.9); }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }
        
        button { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            background: #333; 
            color: white; 
        }
        button:active { transform: scale(0.98); }

        input[type="text"], input[type="number"], select { 
            width: 100%; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #555; 
            box-sizing: border-box;
            font-size: 16px;
            background: var(--bg-color);
            color: var(--text-color);
        }

        .time-input-container { display: flex; gap: 10px; }
        .time-input-container input { text-align: center; }

        .btn-werbung { background: #4CAF50; font-size: 18px; }
        .btn-pause { background: #9C27B0; }
        .btn-timer { background: #2196F3; }
        .btn-alert { background: #E91E63; }
        .btn-poll { background: #FF9800; color: black; }
        
        .icon-active { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        /* Pop-up Fenster (Modal) für den Abstimmmodus */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-close-modal { background: #f44336; grid-column: span 2; }

        /* Zuschauermodus Voting-Fläche */
        #vote-ui { display: none; text-align: center; padding: 20px; }
        .vote-btn { width: 100%; margin-top: 15px; font-size: 22px; padding: 25px; border-radius: 10px; border: none; font-weight: bold; color: white; }
        .vote-btn.option-a { background: #008CBA; }
        .vote-btn.option-b { background: #f44336; }
        .success-message { display: none; color: #4CAF50; font-size: 26px; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body class="theme-dark" id="app-body">

    <!-- ================= 📱 ADMIN FERNBEDIENUNG ================= -->
    <div id="control-ui" style="display: flex; flex-direction: column; gap: 20px;">
        <h2>📱 Steuerung Pro</h2>

        <div class="extras-bar">
            <button class="icon-btn" id="btn-blackout" title="Bildschirm Aus">📴</button>
            <button class="icon-btn" id="btn-theme" title="Design wechseln">🎨</button>
            <button class="icon-btn" id="btn-clock" title="Uhr-Widget umschalten">🕒</button>
            <button class="icon-btn" id="btn-small-clock" title="Kleine Uhr oben links umschalten">⏱️</button>
            <button class="icon-btn" id="btn-weather" title="Wetter">🌤️</button>
            <button class="icon-btn" id="btn-logo" title="Sender-Logo">🖼️</button>
            <button class="icon-btn" id="btn-open-poll" title="Abstimmmodus">📊</button>
        </div>

        <button class="btn-werbung" id="btn-werbung-start">▶ Standard Werbung starten</button>

        <div class="card">
            <h3>Manuelle Pausen</h3>
            <button class="btn-pause" id="btn-pause5">⏳ 5 Min Warnung</button>
            <button class="btn-pause" id="btn-pause3">⏳ 3 Min Warnung</button>
        </div>

        <div class="card">
            <h3>Pausentimer</h3>
            <div class="time-input-container">
                <input type="number" id="pauseMin" placeholder="Minuten" min="0" value="0">
                <input type="number" id="pauseSec" placeholder="Sekunden" min="0" max="59" value="0">
            </div>
            <button class="btn-timer" id="btn-start-timer">⏱️ Timer starten</button>
        </div>

        <div class="card">
            <h3>📢 Eigene Nachricht</h3>
            <input type="text" id="alertText" placeholder="Nachricht eintippen...">
            <div class="time-input-container">
                <input type="number" id="alertMin" placeholder="Minuten" min="0" value="5">
                <input type="number" id="alertSec" placeholder="Sekunden" min="0" max="59" value="0">
            </div>
            <button class="btn-alert" id="btn-start-alert">Anzeigen</button>
        </div>
    </div>


    <!-- ================= 📊 ABSTIMMMODUS POP-UP (MODAL) ================= -->
    <div id="poll-modal" class="modal">
        <div class="modal-content">
            <h3>📊 Live-Umfrage Erstellen</h3>
            <input type="text" id="pollTitle" placeholder="Name der Umfrage (z.B. Lieblingsspiel)">
            <input type="text" id="pollDesc" placeholder="Beschreibung (z.B. Was zockt ihr am liebsten?)">
            
            <label style="font-weight: bold; font-size: 14px; margin-top: 5px; display: block;">Antwortmöglichkeiten:</label>
            <input type="text" id="pollOptA" placeholder="Option A" value="Option A">
            <input type="text" id="pollOptB" placeholder="Option B" value="Option B">
            
            <button class="btn-poll" id="btn-poll-start">🚀 Umfrage auf TV starten</button>
            
            <div class="modal-actions">
                <button style="background: #2196F3;" id="btn-poll-minimize">📉 Minimieren</button>
                <button style="background: #4CAF50;" id="btn-poll-resolve">🎉 Auflösen</button>
            </div>
            
            <button class="btn-close-modal" id="btn-poll-stop">❌ Umfrage komplett beenden</button>
            <button style="background: #555;" id="btn-close-window">Fenster schließen</button>
        </div>
    </div>


    <!-- ================= 👥 ZUSCHAUER LIVE-VOTING SEITE ================= -->
    <div id="vote-ui">
        <h2 id="display-poll-title">Lade Umfrage...</h2>
        <p id="display-poll-desc" style="color: #aaa; font-size: 18px;">Bitte warten...</p>
        
        <div id="voting-area">
            <button class="vote-btn option-a" id="btn-vote-a">Option A</button>
            <button class="vote-btn option-b" id="btn-vote-b">Option B</button>
        </div>
        
        <div class="success-message" id="vote-success">Stimme erfolgreich gezählt! 🎉</div>
    </div>


    <!-- ================= ⚙️ JAVASCRIPT LOGIK ================= -->
    <script>
        // Realtime Database Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyDLvfW6NyXcxAPYakErDOMNiIj9Iii6PO8",
            authDomain: "werbungfersteuern.firebaseapp.com",
            databaseURL: "https://werbungfersteuern-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "werbungfersteuern",
            storageBucket: "werbungfersteuern.firebasestorage.app",
            messagingSenderId: "630825517269",
            appId: "1:630825517269:web:44cf935bee6c1074c2e25c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentStatus = { mode: "werbung" };
        let smallClockActive = false;

        // ROUTING AUF NETLIFY: Erkennt blitzschnell den ?vote=1 Parameter
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('vote')) {
            aktiviereZuschauerModus();
        } else {
            aktiviereAdminModus();
        }

        // --- ADMIN INITIALISIERUNG ---
        function aktiviereAdminModus() {
            document.getElementById('control-ui').style.display = 'flex';
            document.getElementById('vote-ui').style.display = 'none';

            document.getElementById('btn-blackout').addEventListener('click', () => setMode('blackout'));
            document.getElementById('btn-theme').addEventListener('click', toggleTheme);
            document.getElementById('btn-clock').addEventListener('click', () => setMode('clock'));
            document.getElementById('btn-werbung-start').addEventListener('click', () => setMode('werbung'));
            document.getElementById('btn-pause5').addEventListener('click', () => setMode('pause5'));
            document.getElementById('btn-pause3').addEventListener('click', () => setMode('pause3'));
            
            document.getElementById('btn-start-timer').addEventListener('click', startTimer);
            document.getElementById('btn-start-alert').addEventListener('click', startAlertText);

            document.getElementById('btn-small-clock').addEventListener('click', () => {
                smallClockActive = !smallClockActive;
                db.ref('settings/smallClock').set(smallClockActive);
            });

            document.getElementById('btn-open-poll').addEventListener('click', () => {
                document.getElementById('poll-modal').style.display = 'flex';
            });
            document.getElementById('btn-close-window').addEventListener('click', () => {
                document.getElementById('poll-modal').style.display = 'none';
            });

            document.getElementById('btn-poll-start').addEventListener('click', startPollOnTV);
            document.getElementById('btn-poll-minimize').addEventListener('click', () => setMode('poll_minimized'));
            document.getElementById('btn-poll-resolve').addEventListener('click', () => setMode('poll_results'));
            document.getElementById('btn-poll-stop').addEventListener('click', () => {
                setMode('werbung');
                document.getElementById('poll-modal').style.display = 'none';
            });

            db.ref('status').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) currentStatus = data;
            });
            
            db.ref('settings/smallClock').on('value', (snapshot) => {
                smallClockActive = snapshot.val() || false;
                const btn = document.getElementById('btn-small-clock');
                if(smallClockActive) btn.classList.add('icon-active');
                else btn.classList.remove('icon-active');
            });
        }

        // --- ADMIN AKTIONEN ---
        function setMode(modeName) {
            db.ref('status').update({ mode: modeName, endTime: null, msg: "" });
        }

        // ... (Der restliche Code bleibt stabil wie zuvor) ...
        function toggleTheme() {
            let currentTheme = document.getElementById('app-body').className === "theme-dark" ? "theme-light" : "theme-dark";
            db.ref('settings/theme').set(currentTheme);
        }

        function startTimer() {
            const mins = parseInt(document.getElementById('pauseMin').value) || 0;
            const secs = parseInt(document.getElementById('pauseSec').value) || 0;
            const totalMs = ((mins * 60) + secs) * 1000;
            if (totalMs <= 0) { alert("Bitte Zeit eingeben!"); return; }
            
            const now = Date.now();
            db.ref('status').update({ mode: "custom_pause", startTime: now, endTime: now + totalMs });
            alert("Pausentimer läuft!");
        }

        function startAlertText() {
            const text = document.getElementById('alertText').value;
            const mins = parseInt(document.getElementById('alertMin').value) || 0;
            const secs = parseInt(document.getElementById('alertSec').value) || 0;
            const totalMs = ((mins * 60) + secs) * 1000;
            
            if (!text) { alert("Bitte gib einen Text ein!"); return; }
            if (totalMs <= 0) { alert("Bitte eine Dauer eingeben!"); return; }
            
            db.ref('status').update({ mode: "alert_text", msg: text, endTime: Date.now() + totalMs });
            document.getElementById('alertText').value = ""; 
            alert("Nachricht gesendet!");
        }

        // GENIALER TRICK: Netlify liest die aktuelle Domain selbst aus!
        function startPollOnTV() {
            const title = document.getElementById('pollTitle').value || "Live-Umfrage";
            const desc = document.getElementById('pollDesc').value || "Scannt den Code zum Abstimmen!";
            const optA = document.getElementById('pollOptA').value || "Option A";
            const optB = document.getElementById('pollOptB').value || "Option B";

            // Baut automatisch: https://deineseite.netlify.app/?vote=1
            const finalVoteUrl = window.location.origin + window.location.pathname + "?vote=1";

            db.ref('poll').set({
                title: title,
                description: desc,
                optionA: optA,
                optionB: optB,
                votesA: 0,
                votesB: 0,
                qrUrl: finalVoteUrl
            });

            setMode('poll');
            alert("Umfrage läuft auf dem TV!");
        }

        // --- ZUSCHAUER INITIALISIERUNG & VOTING ---
        function aktiviereZuschauerModus() {
            document.getElementById('control-ui').style.display = 'none';
            document.getElementById('vote-ui').style.display = 'block';

            const btnA = document.getElementById('btn-vote-a');
            const btnB = document.getElementById('btn-vote-b');

            db.ref('poll').on('value', (snapshot) => {
                const pollData = snapshot.val();
                if(pollData) {
                    document.getElementById('display-poll-title').innerText = pollData.title;
                    document.getElementById('display-poll-desc').innerText = pollData.description;
                    btnA.innerText = pollData.optionA;
                    btnB.innerText = pollData.optionB;
                }
            });

            btnA.addEventListener('click', () => submitVote('votesA'));
            btnB.addEventListener('click', () => submitVote('votesB'));
        }

        function submitVote(voteField) {
            db.ref('poll/' + voteField).transaction((currentVotes) => {
                return (currentVotes || 0) + 1;
            });
            document.getElementById('voting-area').style.display = 'none';
            document.getElementById('vote-success').style.display = 'block';
        }

        db.ref('settings/theme').on('value', (snapshot) => {
            const theme = snapshot.val();
            if (theme) document.getElementById('app-body').className = theme;
        });
    </script>
</body>
</html>
